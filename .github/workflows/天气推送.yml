name: Weather -> DingTalk

on:
  schedule:
    # 每天 07:00 (UTC+8) 触发示例 — cron 使用 UTC，请按需调整
    - cron: '23 23 * * *'
  workflow_dispatch: {}

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install requests

      - name: Send weather to DingTalk
        env:
          # 已按你的要求写死（示例值：88888888）
          WEATHER_API_ID: "88888888"
          WEATHER_API_KEY: "88888888"
          # 省/市写死为 安徽 / 宣城（如需更改直接修改此处）
          PROVINCE: "安徽"
          CITY: "宣城"
          # 钉钉 webhook（含 access_token）请在仓库 Secrets 中添加，名为 DINGTALK_WEBHOOK
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          # 如果钉钉机器人启用“加签”，在 Secrets 中添加 DINGTALK_SECRET（可选）
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
        run: python scripts/send_weather.py
